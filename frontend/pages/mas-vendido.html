<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{if(localStorage.getItem('tema')==='oscuro')document.documentElement.setAttribute('data-tema','oscuro');}catch(e){}</script>
    <title>Más demandadas - PokeTrade</title>
    <meta name="description" content="Las cartas Pokémon más buscadas y ofrecidas en tradeos activos de PokeTrade.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="mv-contenedor">
            <h1>Cartas más demandadas</h1>
            <p class="subtitulo">Ranking en tiempo real según las apariciones en tradeos activos.</p>

            <div id="error-box" class="alerta-error" hidden role="alert">
                <span id="error-msg">No se pudieron cargar los datos.</span>
                <button id="btn-reintentar-mv" type="button">Reintentar</button>
            </div>

            <div id="grid-mas-vendido" class="grid-cartas" aria-live="polite">
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/mas-vendido.js"></script>
</body>
</html>

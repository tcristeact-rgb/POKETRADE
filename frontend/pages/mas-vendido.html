<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var d=document.documentElement,s=localStorage;if(s.getItem('tema')==='oscuro')d.setAttribute('data-tema','oscuro');var p=location.pathname.split('/')[1]||'',pre=p.length===2&&p!=='es',raiz=pre||p===''||p==='pages'||p.slice(-5)==='.html',i=pre?p:(s.getItem('idioma')||'es');if(raiz&&!pre&&i!=='es'){location.replace('/'+i+location.pathname+location.search);}d.lang=i;if(i!=='es'){d.classList.add('i18n-pendiente');setTimeout(function(){d.classList.remove('i18n-pendiente');},1500);}}catch(err){}</script>
    <title data-i18n="meta.masvendido.title">Más demandadas - PokeTrade</title>
    <meta name="description" data-i18n-attr="content:meta.masvendido.desc" content="Las cartas Pokémon más buscadas y ofrecidas en tradeos activos de PokeTrade.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="mv-contenedor">
            <h1 data-i18n="mv.titulo">Cartas más demandadas</h1>
            <p class="subtitulo" data-i18n="mv.subtitulo">Ranking en tiempo real según las apariciones en tradeos activos.</p>

            <div id="error-box" class="alerta-error" hidden role="alert">
                <span id="error-msg" data-i18n="mv.errorDatos">No se pudieron cargar los datos.</span>
                <button id="btn-reintentar-mv" type="button" data-i18n="comun.reintentar">Reintentar</button>
            </div>

            <div id="grid-mas-vendido" class="grid-cartas" aria-live="polite">
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/mas-vendido.js"></script>
</body>
</html>

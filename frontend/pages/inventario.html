<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Inventario - PokeTrade</title>
    <meta name="description" content="Gestiona tu colección de cartas Pokémon en PokeTrade.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="inventario-contenedor">
            <div class="inventario-header">
                <h1><img class="icono" src="../img/icons/inventario.svg" alt="" /> Mi Inventario</h1>
                <button class="btn-primario" id="btn-abrir-modal" type="button">+ Añadir carta</button>
            </div>

            <div id="alerta" class="alerta"></div>

            <div id="grid-inventario" class="grid-inventario">
                <p>Cargando inventario...</p>
            </div>
        </div>
    </main>

    <!-- Modal: seleccionar carta para añadir -->
    <div class="modal-overlay" id="modal-overlay" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-inv-titulo">
            <div class="inv-modal-header">
                <h2 id="modal-inv-titulo">Añadir carta al inventario</h2>
                <button class="btn-cerrar-modal" id="btn-cerrar-modal-inv" type="button" aria-label="Cerrar ventana">✕</button>
            </div>

            <div class="modal-filtros">
                <input type="text" id="modal-buscar" placeholder="Buscar carta..."
                       aria-label="Buscar carta en el catálogo" />
            </div>

            <div id="lista-cartas-modal" class="lista-cartas-modal">
                <p>Cargando cartas...</p>
            </div>

            <div id="seleccion-panel" class="seleccion-panel" hidden>
                <p><strong id="nombre-seleccionada"></strong></p>
                <div class="cantidad-control">
                    <button id="btn-cantidad-menos" type="button" aria-label="Disminuir cantidad">−</button>
                    <span id="cantidad-valor" aria-live="polite">1</span>
                    <button id="btn-cantidad-mas" type="button" aria-label="Aumentar cantidad">+</button>
                </div>
                <button class="btn-formulario" id="btn-confirmar-anadir" type="button">Añadir al inventario</button>
            </div>
        </div>
    </div>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/inventario.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var d=document.documentElement,s=localStorage,h=document.head;if(s.getItem('tema')==='oscuro')d.setAttribute('data-tema','oscuro');var p=location.pathname.split('/')[1]||'',pre=p.length===2&&p!=='es',raiz=pre||p===''||p==='pages'||p.slice(-5)==='.html',i=pre?p:(s.getItem('idioma')||'es');if(raiz&&!pre&&i!=='es'){location.replace('/'+i+location.pathname+location.search);}d.lang=i;if(i!=='es'){d.classList.add('i18n-pendiente');setTimeout(function(){d.classList.remove('i18n-pendiente');},1500);}function pista(r,u,c){var l=document.createElement('link');l.rel=r;l.href=u;if(c)l.crossOrigin='';h.appendChild(l);}pista('modulepreload',(location.pathname.indexOf('/pages/')>-1?'../':'')+'js/i18n/'+i+'.js');if(!/^(localhost|127\.)/.test(location.hostname))pista('preconnect','https://poketrade-api-3nwm.onrender.com',1);}catch(err){}</script>
    <title data-i18n="meta.perfil.title">Mi Perfil - PokeTrade</title>
    <meta name="description" data-i18n-attr="content:meta.perfil.desc" content="Edita tu perfil y cambia tu contraseña en PokeTrade.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">

    <!-- Pistas de carga. El núcleo de módulos se descubre en cascada (header.js
         → auth.js → config.js) y cada nivel cuesta un ida y vuelta entero: esto
         los baja todos a la vez. El diccionario del idioma lo añade el script de
         arriba, que es el único que sabe cuál es.

         La fuente NO se precarga a propósito: son 61 KB que le robarían ancho de
         banda al CSS, que es lo único que bloquea el pintado. Y no hace falta —
         con font-display: swap el texto se lee desde el primer instante y la
         fuente entra cuando llega. Medido: precargarla retrasaba el primer
         pintado 130 ms. -->
    <link rel="modulepreload" href="../js/i18n.js">
    <link rel="modulepreload" href="../js/auth.js">
    <link rel="modulepreload" href="../js/config.js">
    <link rel="modulepreload" href="../js/utils.js">
    <link rel="modulepreload" href="../js/seo.js">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="perfil-contenedor">
            <h1><img class="icono" src="../img/icons/perfil.svg" alt="" /> <span data-i18n="perfil.titulo">Mi Perfil</span></h1>

            <!-- Datos personales -->
            <div class="seccion-card">
                <h2 data-i18n="perfil.datosPersonales">Datos personales</h2>

                <div id="alerta-perfil" class="alerta"></div>

                <div class="avatar-wrap">
                    <div id="avatar-container">
                        <div class="avatar-placeholder" aria-hidden="true"><img class="icono" src="../img/icons/usuario.svg" alt="" /></div>
                    </div>
                </div>

                <div class="formulario-grupo">
                    <label for="nombre" data-i18n="auth.nombre">Nombre</label>
                    <input type="text" id="nombre"
                           data-i18n-attr="placeholder:auth.nombrePlaceholder" placeholder="Tu nombre" autocomplete="given-name" />
                </div>

                <div class="formulario-grupo">
                    <label for="apellido" data-i18n="auth.apellido">Apellido</label>
                    <input type="text" id="apellido"
                           data-i18n-attr="placeholder:auth.apellidoPlaceholder" placeholder="Tu apellido" autocomplete="family-name" />
                </div>

                <div class="formulario-grupo">
                    <label for="email" data-i18n="auth.email">Email</label>
                    <input type="email" id="email"
                           data-i18n-attr="placeholder:auth.emailPlaceholder" placeholder="tu@email.com" disabled />
                </div>

                <div class="formulario-grupo">
                    <label for="nacionalidad" data-i18n="auth.nacionalidad">Nacionalidad</label>
                    <input type="text" id="nacionalidad"
                           data-i18n-attr="placeholder:perfil.nacionalidadPlaceholder" placeholder="Ej: España" autocomplete="country-name" />
                </div>

                <div class="formulario-grupo">
                    <label for="fecha_nacimiento" data-i18n="auth.fechaNacimiento">Fecha de nacimiento</label>
                    <input type="date" id="fecha_nacimiento" />
                </div>

                <div class="formulario-grupo">
                    <label for="avatar_url" data-i18n="perfil.avatarUrl">URL de avatar</label>
                    <input type="url" id="avatar_url" placeholder="https://..." />
                </div>

                <button class="btn-formulario" id="btn-guardar-perfil" type="button" data-i18n="perfil.guardar">Guardar cambios</button>
            </div>

            <!-- Cambiar contraseña -->
            <div class="seccion-card">
                <h2 data-i18n="perfil.cambiarPassword">Cambiar contraseña</h2>

                <div id="alerta-password" class="alerta"></div>

                <div class="formulario-grupo">
                    <label for="password_actual" data-i18n="perfil.passwordActual">Contraseña actual</label>
                    <input type="password" id="password_actual" placeholder="••••••" autocomplete="current-password" />
                </div>

                <div class="formulario-grupo">
                    <label for="password_nueva" data-i18n="perfil.passwordNueva">Nueva contraseña</label>
                    <input type="password" id="password_nueva"
                           data-i18n-attr="placeholder:perfil.minimo6" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
                </div>

                <div class="formulario-grupo">
                    <label for="password_confirmar" data-i18n="perfil.passwordConfirmar">Confirmar nueva contraseña</label>
                    <input type="password" id="password_confirmar"
                           data-i18n-attr="placeholder:perfil.repiteNueva" placeholder="Repite la nueva contraseña" autocomplete="new-password" />
                </div>

                <button class="btn-formulario" id="btn-cambiar-password" type="button" data-i18n="perfil.cambiarPassword">Cambiar contraseña</button>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/perfil.js"></script>
</body>
</html>

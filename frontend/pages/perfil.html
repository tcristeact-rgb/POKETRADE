<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - PokeTrade</title>
    <meta name="description" content="Edita tu perfil y cambia tu contraseña en PokeTrade.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="perfil-contenedor">
            <h1><img class="icono" src="../img/icons/perfil.svg" alt="" /> Mi Perfil</h1>

            <!-- Datos personales -->
            <div class="seccion-card">
                <h2>Datos personales</h2>

                <div id="alerta-perfil" class="alerta"></div>

                <div class="avatar-wrap">
                    <div id="avatar-container">
                        <div class="avatar-placeholder" aria-hidden="true"><img class="icono" src="../img/icons/usuario.svg" alt="" /></div>
                    </div>
                </div>

                <div class="formulario-grupo">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="given-name" />
                </div>

                <div class="formulario-grupo">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Tu apellido" autocomplete="family-name" />
                </div>

                <div class="formulario-grupo">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" disabled />
                </div>

                <div class="formulario-grupo">
                    <label for="nacionalidad">Nacionalidad</label>
                    <input type="text" id="nacionalidad" placeholder="Ej: España" autocomplete="country-name" />
                </div>

                <div class="formulario-grupo">
                    <label for="fecha_nacimiento">Fecha de nacimiento</label>
                    <input type="date" id="fecha_nacimiento" />
                </div>

                <div class="formulario-grupo">
                    <label for="avatar_url">URL de avatar</label>
                    <input type="url" id="avatar_url" placeholder="https://..." />
                </div>

                <button class="btn-formulario" id="btn-guardar-perfil" type="button">Guardar cambios</button>
            </div>

            <!-- Cambiar contraseña -->
            <div class="seccion-card">
                <h2>Cambiar contraseña</h2>

                <div id="alerta-password" class="alerta"></div>

                <div class="formulario-grupo">
                    <label for="password_actual">Contraseña actual</label>
                    <input type="password" id="password_actual" placeholder="••••••" autocomplete="current-password" />
                </div>

                <div class="formulario-grupo">
                    <label for="password_nueva">Nueva contraseña</label>
                    <input type="password" id="password_nueva" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
                </div>

                <div class="formulario-grupo">
                    <label for="password_confirmar">Confirmar nueva contraseña</label>
                    <input type="password" id="password_confirmar" placeholder="Repite la nueva contraseña" autocomplete="new-password" />
                </div>

                <button class="btn-formulario" id="btn-cambiar-password" type="button">Cambiar contraseña</button>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/perfil.js"></script>
</body>
</html>

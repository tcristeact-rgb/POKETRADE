<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var d=document.documentElement,s=localStorage;if(s.getItem('tema')==='oscuro')d.setAttribute('data-tema','oscuro');var p=location.pathname.split('/')[1]||'',pre=p.length===2&&p!=='es',raiz=pre||p===''||p==='pages'||p.slice(-5)==='.html',i=pre?p:(s.getItem('idioma')||'es');if(raiz&&!pre&&i!=='es'){location.replace('/'+i+location.pathname+location.search);}d.lang=i;if(i!=='es'){d.classList.add('i18n-pendiente');setTimeout(function(){d.classList.remove('i18n-pendiente');},1500);}}catch(err){}</script>
    <title data-i18n="meta.tradeos.title">Mis Tradeos - PokeTrade</title>
    <meta name="description" data-i18n-attr="content:meta.tradeos.desc" content="Gestiona tus tradeos de cartas Pokémon en PokeTrade.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="tradeos-contenedor">
            <div class="tradeos-header">
                <h1><img class="icono" src="../img/icons/tradeos.svg" alt="" /> <span data-i18n="tradeos.titulo">Mis Tradeos</span></h1>
                <a href="publicar-tradeo.html" class="btn-primario" data-i18n="tradeos.nuevo">+ Nuevo tradeo</a>
            </div>

            <div id="alerta" class="alerta"></div>

            <div class="filtro-estado" role="group"
                 data-i18n-attr="aria-label:tradeos.filtrarAria" aria-label="Filtrar tradeos por estado">
                <button class="btn-filtro activo" type="button" data-estado="todos"     data-i18n="tradeos.todos">Todos</button>
                <button class="btn-filtro" type="button" data-estado="activo"    data-i18n="tradeos.activos">Activos</button>
                <button class="btn-filtro" type="button" data-estado="cerrado"   data-i18n="tradeos.cerrados">Cerrados</button>
                <button class="btn-filtro" type="button" data-estado="cancelado" data-i18n="tradeos.cancelados">Cancelados</button>
            </div>

            <div id="lista-tradeos">
                <p data-i18n="tradeos.cargando">Cargando tradeos...</p>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/tradeos.js"></script>
</body>
</html>

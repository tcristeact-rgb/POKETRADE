<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{if(localStorage.getItem('tema')==='oscuro')document.documentElement.setAttribute('data-tema','oscuro');}catch(e){}</script>
    <title>Mis Tradeos - PokeTrade</title>
    <meta name="description" content="Gestiona tus tradeos de cartas Pokémon en PokeTrade.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="tradeos-contenedor">
            <div class="tradeos-header">
                <h1><img class="icono" src="../img/icons/tradeos.svg" alt="" /> Mis Tradeos</h1>
                <a href="publicar-tradeo.html" class="btn-primario">+ Nuevo tradeo</a>
            </div>

            <div id="alerta" class="alerta"></div>

            <div class="filtro-estado" role="group" aria-label="Filtrar tradeos por estado">
                <button class="btn-filtro activo" type="button" data-estado="todos">Todos</button>
                <button class="btn-filtro" type="button" data-estado="activo">Activos</button>
                <button class="btn-filtro" type="button" data-estado="cerrado">Cerrados</button>
                <button class="btn-filtro" type="button" data-estado="cancelado">Cancelados</button>
            </div>

            <div id="lista-tradeos">
                <p>Cargando tradeos...</p>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/tradeos.js"></script>
</body>
</html>

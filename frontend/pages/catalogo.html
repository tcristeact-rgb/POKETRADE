<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{if(localStorage.getItem('tema')==='oscuro')document.documentElement.setAttribute('data-tema','oscuro');}catch(e){}</script>
    <title>Catálogo - PokeTrade</title>
    <meta name="description" content="Explora el catálogo de cartas Pokémon de PokeTrade y filtra por nombre, tipo o rareza para encontrar la carta que buscas.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>
    <main>
        <div class="catalogo-contenedor">
            <h1>Catálogo de cartas</h1>

            <!-- Filtros -->
            <div class="filtros" role="search" aria-label="Filtros del catálogo">
                <input type="text" id="filtro-nombre" placeholder="Buscar por nombre..."
                       aria-label="Buscar carta por nombre" />
                <!-- Las opciones de tipo y rareza las rellena catalogo.js
                     con los valores reales del catálogo (GET /cartas/filtros) -->
                <select id="filtro-tipo" aria-label="Filtrar por tipo">
                    <option value="">Todos los tipos</option>
                </select>
                <select id="filtro-rareza" aria-label="Filtrar por rareza">
                    <option value="">Todas las rarezas</option>
                </select>
            </div>

            <!-- Info de paginación -->
            <p class="paginacion-info" id="paginacion-info"></p>

            <!-- Grid de cartas -->
            <div id="grid-cartas" class="grid-cartas">
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
            </div>

            <!-- Paginación -->
            <nav class="paginacion" id="paginacion" aria-label="Paginación del catálogo"></nav>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/catalogo.js"></script>
</body>
</html>

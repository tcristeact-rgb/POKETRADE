<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var d=document.documentElement,s=localStorage;if(s.getItem('tema')==='oscuro')d.setAttribute('data-tema','oscuro');var i=s.getItem('idioma')||(navigator.language||'es').slice(0,2);d.lang=i;if(i!=='es'){d.classList.add('i18n-pendiente');setTimeout(function(){d.classList.remove('i18n-pendiente');},1500);}}catch(e){}</script>
    <title data-i18n="meta.catalogo.title">Catálogo - PokeTrade</title>
    <meta name="description" data-i18n-attr="content:meta.catalogo.desc" content="Explora el catálogo completo del TCG de Pokémon por series y sets de expansión, busca cartas por nombre y filtra por tipo o rareza.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>
    <main>
        <div class="catalogo-contenedor">
            <!-- Breadcrumb y cabecera: los ajusta catalogo.js según la
                 vista (series, sets de una serie ?serie=, cartas de un
                 set ?set= o resultados de la búsqueda global) -->
            <nav class="breadcrumb" id="breadcrumb"
                 data-i18n-attr="aria-label:catalogo.rutaNavegacion" aria-label="Ruta de navegación">
                <a href="../index.html" data-i18n="comun.inicio">Inicio</a> ›
                <span data-i18n="catalogo.titulo">Catálogo</span>
            </nav>

            <div id="cabecera-catalogo" class="set-cabecera">
                <div>
                    <h1 id="titulo-catalogo" data-i18n="catalogo.titulo">Catálogo</h1>
                    <p class="set-meta" id="subtitulo-catalogo"></p>
                </div>
            </div>

            <!-- Barra de filtros persistente: visible en todos los
                 niveles, sticky bajo el header. Su estado vive en la
                 URL (q, tipo, rareza) → filtros-catalogo.js -->
            <div class="filtros filtros-catalogo" role="search"
                 data-i18n-attr="aria-label:catalogo.filtrosAria" aria-label="Filtros del catálogo">
                <input type="text" id="filtro-nombre"
                       data-i18n-attr="placeholder:catalogo.buscarNombre;aria-label:catalogo.buscarNombre"
                       placeholder="Buscar carta por nombre..."
                       aria-label="Buscar carta por nombre" />
                <select id="filtro-tipo" data-i18n-attr="aria-label:catalogo.filtrarTipo" aria-label="Filtrar por tipo">
                    <option value="" data-i18n="catalogo.todosTipos">Todos los tipos</option>
                </select>
                <select id="filtro-rareza" data-i18n-attr="aria-label:catalogo.filtrarRareza" aria-label="Filtrar por rareza">
                    <option value="" data-i18n="catalogo.todasRarezas">Todas las rarezas</option>
                </select>
                <button id="btn-limpiar-filtros" class="btn-limpiar-filtros" type="button" hidden
                        data-i18n="catalogo.limpiarFiltros">
                    ✕ Limpiar filtros
                </button>
            </div>

            <!-- Indicador de modo: "Buscando en todo el catálogo" o
                 "Filtrando en {set}" -->
            <p class="modo-filtro" id="modo-filtro" aria-live="polite" hidden></p>

            <!-- Info de paginación -->
            <p class="paginacion-info" id="paginacion-info"></p>

            <!-- Aviso de espera larga: la primera visita a un set no
                 cacheado tiene que traerlo de TCGdex (cache-aside).
                 catalogo.js lo muestra a los 2,5 s de espera. -->
            <p class="aviso-carga" id="aviso-carga" role="status" hidden data-i18n="catalogo.avisoCarga">
                Cargando el set por primera vez… puede tardar unos segundos.
            </p>

            <!-- Grid de series, sets o cartas según la vista -->
            <div id="grid-catalogo" class="grid-sets">
                <div class="set-card skeleton" aria-hidden="true"></div>
                <div class="set-card skeleton" aria-hidden="true"></div>
                <div class="set-card skeleton" aria-hidden="true"></div>
                <div class="set-card skeleton" aria-hidden="true"></div>
                <div class="set-card skeleton" aria-hidden="true"></div>
                <div class="set-card skeleton" aria-hidden="true"></div>
                <div class="set-card skeleton" aria-hidden="true"></div>
                <div class="set-card skeleton" aria-hidden="true"></div>
            </div>

            <!-- Paginación (solo en la vista de cartas de un set) -->
            <nav class="paginacion" id="paginacion"
                 data-i18n-attr="aria-label:catalogo.paginacionAria" aria-label="Paginación del catálogo"></nav>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/catalogo.js"></script>
</body>
</html>

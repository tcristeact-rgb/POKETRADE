<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - PokeTrade</title>
    <meta name="description" content="Explora el catálogo de cartas Pokémon de PokeTrade y filtra por nombre, tipo o rareza para encontrar la carta que buscas.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>
    <main>
        <div class="catalogo-contenedor">
            <h1>Catálogo de cartas</h1>

            <!-- Filtros -->
            <div class="filtros" role="search" aria-label="Filtros del catálogo">
                <input type="text" id="filtro-nombre" placeholder="Buscar por nombre..."
                       aria-label="Buscar carta por nombre" />
                <select id="filtro-tipo" aria-label="Filtrar por tipo">
                    <option value="">Todos los tipos</option>
                    <option value="Fuego">Fuego</option>
                    <option value="Agua">Agua</option>
                    <option value="Planta">Planta</option>
                    <option value="Eléctrico">Eléctrico</option>
                    <option value="Psíquico">Psíquico</option>
                    <option value="Normal">Normal</option>
                    <option value="Lucha">Lucha</option>
                    <option value="Veneno">Veneno</option>
                    <option value="Tierra">Tierra</option>
                    <option value="Roca">Roca</option>
                    <option value="Bicho">Bicho</option>
                    <option value="Fantasma">Fantasma</option>
                    <option value="Acero">Acero</option>
                    <option value="Dragón">Dragón</option>
                    <option value="Siniestro">Siniestro</option>
                    <option value="Hada">Hada</option>
                    <option value="Hielo">Hielo</option>
                    <option value="Volador">Volador</option>
                </select>
                <select id="filtro-rareza" aria-label="Filtrar por rareza">
                    <option value="">Todas las rarezas</option>
                    <option value="Común">Común</option>
                    <option value="Poco común">Poco común</option>
                    <option value="Rara">Rara</option>
                    <option value="Rara Holo">Rara Holo</option>
                    <option value="Ultra Rara">Ultra Rara</option>
                </select>
            </div>

            <!-- Info de paginación -->
            <p class="paginacion-info" id="paginacion-info"></p>

            <!-- Grid de cartas -->
            <div id="grid-cartas" class="grid-cartas">
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
            </div>

            <!-- Paginación -->
            <nav class="paginacion" id="paginacion" aria-label="Paginación del catálogo"></nav>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/catalogo.js"></script>
</body>
</html>

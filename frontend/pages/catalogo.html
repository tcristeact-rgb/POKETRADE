<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - PokeTrade</title>
    <meta name="description" content="Explora el catálogo de cartas Pokémon de PokeTrade y filtra por nombre, tipo o rareza para encontrar la carta que buscas.">
    <link rel="stylesheet" href="../css/estilos.css">
    <style>
        .catalogo-contenedor {
            max-width: 1200px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }
        .catalogo-contenedor h1 {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--texto);
        }

        /* Paginación */
        .paginacion {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin: 2.5rem 0;
            flex-wrap: wrap;
        }
        .btn-pagina {
            padding: 0.45rem 0.9rem;
            border: 1.5px solid var(--borde);
            border-radius: var(--radius-sm);
            background: var(--fondo-card);
            color: var(--texto);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 500;
            transition: border-color var(--trans), background var(--trans), color var(--trans);
            min-width: 38px;
            text-align: center;
        }
        .btn-pagina:hover { border-color: var(--primario); color: var(--primario); }
        .btn-pagina.activa { background: var(--primario); border-color: var(--primario); color: white; font-weight: 700; }
        .btn-pagina:disabled { opacity: 0.4; cursor: default; }
        .paginacion-info {
            text-align: center;
            color: var(--muted);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div id="app-header"></div>
    <main>
        <div class="catalogo-contenedor">
            <h1>Catálogo de cartas</h1>

            <!-- Filtros -->
            <div class="filtros" role="search" aria-label="Filtros del catálogo">
                <input type="text" id="filtro-nombre" placeholder="Buscar por nombre..."
                       oninput="filtrar()" aria-label="Buscar carta por nombre" />
                <select id="filtro-tipo" onchange="filtrar()" aria-label="Filtrar por tipo">
                    <option value="">Todos los tipos</option>
                    <option value="Fuego">Fuego</option>
                    <option value="Agua">Agua</option>
                    <option value="Planta">Planta</option>
                    <option value="Eléctrico">Eléctrico</option>
                    <option value="Psíquico">Psíquico</option>
                    <option value="Normal">Normal</option>
                    <option value="Lucha">Lucha</option>
                    <option value="Veneno">Veneno</option>
                    <option value="Tierra">Tierra</option>
                    <option value="Roca">Roca</option>
                    <option value="Bicho">Bicho</option>
                    <option value="Fantasma">Fantasma</option>
                    <option value="Acero">Acero</option>
                    <option value="Dragón">Dragón</option>
                    <option value="Siniestro">Siniestro</option>
                    <option value="Hada">Hada</option>
                    <option value="Hielo">Hielo</option>
                    <option value="Volador">Volador</option>
                </select>
                <select id="filtro-rareza" onchange="filtrar()" aria-label="Filtrar por rareza">
                    <option value="">Todas las rarezas</option>
                    <option value="Común">Común</option>
                    <option value="Poco común">Poco común</option>
                    <option value="Rara">Rara</option>
                    <option value="Rara Holo">Rara Holo</option>
                    <option value="Ultra Rara">Ultra Rara</option>
                </select>
            </div>

            <!-- Info de paginación -->
            <p class="paginacion-info" id="paginacion-info"></p>

            <!-- Grid de cartas -->
            <div id="grid-cartas" class="grid-cartas">
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
            </div>

            <!-- Paginación -->
            <div class="paginacion" id="paginacion"></div>
        </div>
    </main>
    <footer>
        <p>© 2026 PokeTrade · <a href="aviso-legal.html">Aviso legal</a> · <a href="privacidad.html">Privacidad</a> · <a href="contacto.html">Soporte</a></p>
    </footer>
    <script src="../js/auth.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/catalogo.js"></script>
</body>
</html>

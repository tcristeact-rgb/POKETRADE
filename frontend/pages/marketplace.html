<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var d=document.documentElement,s=localStorage;if(s.getItem('tema')==='oscuro')d.setAttribute('data-tema','oscuro');var p=location.pathname.split('/')[1]||'',pre=p.length===2&&p!=='es',raiz=pre||p===''||p==='pages'||p.slice(-5)==='.html',i=pre?p:(s.getItem('idioma')||'es');if(raiz&&!pre&&i!=='es'){location.replace('/'+i+location.pathname+location.search);}d.lang=i;if(i!=='es'){d.classList.add('i18n-pendiente');setTimeout(function(){d.classList.remove('i18n-pendiente');},1500);}}catch(err){}</script>
    <title data-i18n="meta.marketplace.title">Marketplace - PokeTrade</title>
    <meta name="description" data-i18n-attr="content:meta.marketplace.desc" content="Explora todos los tradeos activos de la comunidad PokeTrade y encuentra el intercambio perfecto.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

    <div id="app-header"></div>

    <!-- Hero: solo título (el buscador vive en la barra sticky) -->
    <section class="marketplace-hero">
        <h1><img class="icono" src="../img/icons/tradeos.svg" alt="" /> <span data-i18n="mkt.titulo">Marketplace de Tradeos</span></h1>
        <p data-i18n="mkt.subtitulo">Encuentra el intercambio perfecto entre coleccionistas de toda la comunidad</p>
    </section>

    <main class="marketplace-contenedor">

        <!-- Barra de búsqueda sticky bajo el header (patrón del
             catálogo); el contador de resultados viaja con ella -->
        <div class="filtros filtros-catalogo filtros-marketplace" role="search"
             data-i18n-attr="aria-label:mkt.busquedaAria" aria-label="Búsqueda de tradeos">
            <input
                type="text"
                id="buscar-carta"
                data-i18n-attr="placeholder:mkt.buscarPlaceholder;aria-label:mkt.buscarAria"
                placeholder="Buscar por carta (ofrece o busca)..."
                aria-label="Buscar tradeo por carta"
            />
            <!-- Los tipos los rellena marketplace.js desde la API
                 (GET /cartas/filtros), igual que el catálogo: son los 11
                 reales del TCG, ya traducidos y con la clave canónica como
                 value. Antes estaban escritos aquí a mano, y encima eran los
                 18 tipos del VIDEOJUEGO (Eléctrico, Veneno, Tierra, Roca...),
                 que no existen en las cartas: filtrar por ellos no devolvía
                 nunca nada. -->
            <select id="filtro-tipo" data-i18n-attr="aria-label:mkt.filtrarTipoAria" aria-label="Filtrar por tipo de carta">
                <option value="" data-i18n="catalogo.todosTipos">Todos los tipos</option>
            </select>
            <span class="contador-resultados" id="contador" data-i18n="mkt.cargando">Cargando tradeos...</span>
        </div>

        <!-- CTA publicar tradeo -->
        <div class="cta-publicar" id="cta-publicar" hidden>
            <p data-i18n="mkt.ctaPublicar">¿Tienes cartas para intercambiar? Publica tu tradeo y llega a toda la comunidad.</p>
            <a href="publicar-tradeo.html" class="btn-primario" data-i18n="mkt.publicarMio">+ Publicar mi tradeo</a>
        </div>

        <!-- Error de red -->
        <div id="error-box" class="alerta-error" hidden role="alert">
            <span id="error-msg" data-i18n="mkt.errorCargar">No se pudieron cargar los tradeos.</span>
            <button id="btn-reintentar-mkt" type="button" data-i18n="comun.reintentar">Reintentar</button>
        </div>

        <!-- Grid de tradeos (skeletons iniciales; el grid reparte
             las columnas solo con auto-fill) -->
        <div class="grid-tradeos" id="grid-tradeos">
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                    <div class="skeleton-block skeleton-block-linea"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                    <div class="skeleton-block skeleton-block-linea"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                    <div class="skeleton-block skeleton-block-linea"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                    <div class="skeleton-block skeleton-block-linea"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                    <div class="skeleton-block skeleton-block-linea"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
        </div>

    </main>

    <div id="app-footer"></div>

    <!-- Modal: detalle del tradeo (público, informativo). El grid ya trae
         el tradeo entero desde /api/tradeos, así que se pinta al instante
         sin pedir nada: no hay skeleton porque no hay espera. -->
    <div id="modal-detalle" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="detalle-titulo" hidden>
        <div class="modal-caja modal-caja-detalle">
            <div class="modal-header">
                <div class="detalle-autor">
                    <div class="usuario-avatar" id="detalle-avatar" aria-hidden="true"></div>
                    <div class="detalle-autor-txt">
                        <h3 id="detalle-titulo" data-i18n="mkt.detalleTradeo">Detalle del tradeo</h3>
                        <p class="detalle-meta" id="detalle-meta"></p>
                    </div>
                </div>
                <button class="btn-cerrar-modal" id="btn-cerrar-detalle" type="button"
                        data-i18n-attr="aria-label:comun.cerrar" aria-label="Cerrar">✕</button>
            </div>
            <div class="modal-contenido">
                <div id="detalle-cuerpo"></div>
            </div>
            <div class="modal-footer" id="detalle-footer"></div>
        </div>
    </div>

    <!-- Modal: aceptar tradeo -->
    <div id="modal-aceptar" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-titulo" hidden>
        <div class="modal-caja">
            <div class="modal-header">
                <h3 id="modal-titulo" data-i18n="mkt.aceptarTradeo">Aceptar tradeo</h3>
                <button class="btn-cerrar-modal" id="btn-cerrar-aceptar" type="button"
                        data-i18n-attr="aria-label:comun.cerrar" aria-label="Cerrar">✕</button>
            </div>
            <div class="modal-contenido">
                <div id="modal-cuerpo"></div>
                <p id="modal-estado" class="modal-estado" role="status"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar-modal" id="btn-cancelar-aceptar" type="button" data-i18n="comun.cancelar">Cancelar</button>
                <button id="btn-confirmar" class="btn-confirmar-modal" type="button" disabled
                        data-i18n="mkt.confirmarIntercambio">
                    Confirmar intercambio
                </button>
            </div>
        </div>
    </div>

    <!-- Toast de éxito -->
    <div id="toast-mkt" class="toast-mkt" role="alert" hidden></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/marketplace.js"></script>
</body>
</html>

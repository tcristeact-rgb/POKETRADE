<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{if(localStorage.getItem('tema')==='oscuro')document.documentElement.setAttribute('data-tema','oscuro');}catch(e){}</script>
    <title>Marketplace - PokeTrade</title>
    <meta name="description" content="Explora todos los tradeos activos de la comunidad PokeTrade y encuentra el intercambio perfecto.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

    <div id="app-header"></div>

    <!-- Hero con buscador -->
    <section class="marketplace-hero">
        <h1><img class="icono" src="../img/icons/tradeos.svg" alt="" /> Marketplace de Tradeos</h1>
        <p>Encuentra el intercambio perfecto entre coleccionistas de toda la comunidad</p>
        <div class="barra-busqueda" role="search" aria-label="Búsqueda de tradeos">
            <input
                type="text"
                id="buscar-carta"
                placeholder="Buscar por carta (ofrece o busca)..."
                aria-label="Buscar tradeo por carta"
            />
            <select id="filtro-tipo" aria-label="Filtrar por tipo de carta">
                <option value="">Todos los tipos</option>
                <option value="Fuego">Fuego</option>
                <option value="Agua">Agua</option>
                <option value="Planta">Planta</option>
                <option value="Eléctrico">Eléctrico</option>
                <option value="Psíquico">Psíquico</option>
                <option value="Normal">Normal</option>
                <option value="Lucha">Lucha</option>
                <option value="Veneno">Veneno</option>
                <option value="Tierra">Tierra</option>
                <option value="Roca">Roca</option>
                <option value="Bicho">Bicho</option>
                <option value="Fantasma">Fantasma</option>
                <option value="Acero">Acero</option>
                <option value="Dragón">Dragón</option>
                <option value="Siniestro">Siniestro</option>
                <option value="Hada">Hada</option>
                <option value="Hielo">Hielo</option>
                <option value="Volador">Volador</option>
            </select>
        </div>
    </section>

    <main class="marketplace-contenedor">

        <!-- CTA publicar tradeo -->
        <div class="cta-publicar" id="cta-publicar" hidden>
            <p>¿Tienes cartas para intercambiar? Publica tu tradeo y llega a toda la comunidad.</p>
            <a href="publicar-tradeo.html" class="btn-primario">+ Publicar mi tradeo</a>
        </div>

        <!-- Error de red -->
        <div id="error-box" class="alerta-error" hidden role="alert">
            <span id="error-msg">No se pudieron cargar los tradeos.</span>
            <button id="btn-reintentar-mkt" type="button">Reintentar</button>
        </div>

        <!-- Toolbar: contador -->
        <div class="marketplace-toolbar">
            <span class="contador-resultados" id="contador">Cargando tradeos...</span>
        </div>

        <!-- Grid de tradeos -->
        <div class="grid-tradeos" id="grid-tradeos">
            <!-- Skeletons iniciales -->
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                    <div class="skeleton-block skeleton-block-linea"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                    <div class="skeleton-block skeleton-block-linea"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-block skeleton-block-header"></div>
                <div class="skeleton-card-cuerpo">
                    <div class="skeleton-block skeleton-block-grande"></div>
                </div>
                <div class="skeleton-block skeleton-block-footer"></div>
            </div>
        </div>

    </main>

    <div id="app-footer"></div>

    <!-- Modal: aceptar tradeo -->
    <div id="modal-aceptar" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-titulo" hidden>
        <div class="modal-caja">
            <div class="modal-header">
                <h3 id="modal-titulo">Aceptar tradeo</h3>
                <button class="btn-cerrar-modal" id="btn-cerrar-aceptar" type="button" aria-label="Cerrar">✕</button>
            </div>
            <div class="modal-contenido">
                <div id="modal-cuerpo"></div>
                <p id="modal-estado" class="modal-estado" role="status"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar-modal" id="btn-cancelar-aceptar" type="button">Cancelar</button>
                <button id="btn-confirmar" class="btn-confirmar-modal" type="button" disabled>
                    Confirmar intercambio
                </button>
            </div>
        </div>
    </div>

    <!-- Toast de éxito -->
    <div id="toast-mkt" class="toast-mkt" role="alert" hidden></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/marketplace.js"></script>
</body>
</html>

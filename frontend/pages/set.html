<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo… - PokeTrade</title>
    <meta name="robots" content="noindex">
    <!-- Página retirada: las cartas de un set viven ahora en el catálogo
         unificado. El JS traduce ?id=X a ?set=X y conserva página y
         filtros; el meta refresh es el respaldo sin JavaScript. En
         producción, el 301 de vercel.json actúa antes de llegar aquí. -->
    <script>
        var origen  = new URLSearchParams(location.search);
        var destino = new URLSearchParams();
        if (origen.get('id')) destino.set('set', origen.get('id'));
        ['page', 'q', 'tipo', 'rareza'].forEach(function (clave) {
            if (origen.get(clave)) destino.set(clave, origen.get(clave));
        });
        location.replace('catalogo.html' + (destino.toString() ? '?' + destino : ''));
    </script>
    <meta http-equiv="refresh" content="0; url=catalogo.html">
</head>
<body>
    <p>Esta página se ha movido al catálogo. <a href="catalogo.html">Ir al catálogo</a></p>
</body>
</html>

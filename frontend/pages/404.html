<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>try{var d=document.documentElement,s=localStorage;if(s.getItem('tema')==='oscuro')d.setAttribute('data-tema','oscuro');var p=location.pathname.split('/')[1]||'',pre=p.length===2&&p!=='es',raiz=pre||p===''||p==='pages'||p.slice(-5)==='.html',i=pre?p:(s.getItem('idioma')||'es');if(raiz&&!pre&&i!=='es'){location.replace('/'+i+location.pathname+location.search);}d.lang=i;if(i!=='es'){d.classList.add('i18n-pendiente');setTimeout(function(){d.classList.remove('i18n-pendiente');},1500);}}catch(err){}</script>
  <title data-i18n="meta.404.title">Página no encontrada - PokeTrade</title>
  <meta name="description" data-i18n-attr="content:meta.404.desc" content="La página que buscas no existe en PokeTrade.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

  <div id="app-header"></div>

  <main>
    <section class="error-404">
      <p class="error-404-codigo" aria-hidden="true">404</p>
      <h1 data-i18n="e404.titulo">Esta página se ha escapado</h1>
      <p class="error-404-texto" data-i18n="e404.texto">
        No hemos encontrado la página que buscas. Puede que el enlace
        sea incorrecto o que la página ya no exista.
      </p>
      <div class="hero-botones">
        <a href="../index.html" class="btn-primario"  data-i18n="e404.volverInicio">Volver al inicio</a>
        <a href="catalogo.html" class="btn-secundario" data-i18n="e404.verCatalogo">Ver catálogo</a>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>

  <script type="module" src="../js/header.js"></script>
</body>
</html>

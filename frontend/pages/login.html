<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - PokeTrade</title>
      <meta name="description" content="Accede a tu cuenta de PokeTrade para gestionar tu colección, consultar cartas y continuar con tus tradeos." />
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">PokeTrade</a>
            <div id="menu-usuario"></div>
        </nav>
    </header>

    <main>
        <div class="formulario-contenedor">
            <h1>Iniciar sesión</h1>
            <p id="error-mensaje" class="error-texto"></p>

            <div class="formulario-grupo">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tu@email.com" />
            </div>

            <div class="formulario-grupo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••" />
            </div>

            <button onclick="iniciarSesion()" class="btn-formulario">Entrar</button>

            <p class="formulario-pie">
                ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
            </p>
        </div>
    </main>

    <footer>
        <p>© 2026 PokeTrade · <a href="#">Aviso legal</a> · <a href="#">Contacto</a></p>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>

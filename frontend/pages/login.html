<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{if(localStorage.getItem('tema')==='oscuro')document.documentElement.setAttribute('data-tema','oscuro');}catch(e){}</script>
    <title>Iniciar sesión - PokeTrade</title>
    <meta name="description" content="Accede a tu cuenta de PokeTrade para gestionar tu colección, consultar cartas y continuar con tus tradeos." />
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="formulario-contenedor">
            <h1>Iniciar sesión</h1>
            <p id="aviso-registro" class="alerta exito" role="status" hidden>
                Cuenta creada correctamente. Ya puedes iniciar sesión.
            </p>
            <p id="error-mensaje" class="error-texto" role="alert" aria-live="assertive"></p>

            <form id="form-login" novalidate>
                <div class="formulario-grupo">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com"
                           required autocomplete="email" />
                </div>

                <div class="formulario-grupo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña"
                           required autocomplete="current-password" />
                </div>

                <button type="submit" class="btn-formulario">Entrar</button>
            </form>

            <p class="formulario-pie">
                ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
            </p>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var d=document.documentElement,s=localStorage;if(s.getItem('tema')==='oscuro')d.setAttribute('data-tema','oscuro');var p=location.pathname.split('/')[1]||'',pre=p.length===2&&p!=='es',raiz=pre||p===''||p==='pages'||p.slice(-5)==='.html',i=pre?p:(s.getItem('idioma')||'es');if(raiz&&!pre&&i!=='es'){location.replace('/'+i+location.pathname+location.search);}d.lang=i;if(i!=='es'){d.classList.add('i18n-pendiente');setTimeout(function(){d.classList.remove('i18n-pendiente');},1500);}}catch(err){}</script>
    <title data-i18n="meta.login.title">Iniciar sesión - PokeTrade</title>
    <meta name="description" data-i18n-attr="content:meta.login.desc" content="Accede a tu cuenta de PokeTrade para gestionar tu colección, consultar cartas y continuar con tus tradeos." />
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="formulario-contenedor">
            <h1 data-i18n="auth.iniciarSesion">Iniciar sesión</h1>
            <p id="aviso-registro" class="alerta exito" role="status" hidden data-i18n="auth.cuentaCreada">
                Cuenta creada correctamente. Ya puedes iniciar sesión.
            </p>
            <!-- Por qué se pide la sesión (lo rellena login.js según la
                 acción que el usuario intentaba hacer) -->
            <p id="aviso-motivo" class="aviso-motivo" role="status" hidden></p>
            <p id="error-mensaje" class="error-texto" role="alert" aria-live="assertive"></p>

            <form id="form-login" novalidate>
                <div class="formulario-grupo">
                    <label for="email" data-i18n="auth.email">Email</label>
                    <input type="email" id="email" name="email"
                           data-i18n-attr="placeholder:auth.emailPlaceholder" placeholder="tu@email.com"
                           required autocomplete="email" />
                </div>

                <div class="formulario-grupo">
                    <label for="password" data-i18n="auth.password">Contraseña</label>
                    <input type="password" id="password" name="password"
                           data-i18n-attr="placeholder:auth.passwordPlaceholder" placeholder="Tu contraseña"
                           required autocomplete="current-password" />
                </div>

                <button type="submit" class="btn-formulario" data-i18n="auth.entrar">Entrar</button>
            </form>

            <p class="formulario-pie">
                <span data-i18n="auth.noTienesCuenta">¿No tienes cuenta?</span>
                <a href="registro.html" data-i18n="auth.registrate">Regístrate</a>
            </p>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/login.js"></script>
</body>
</html>

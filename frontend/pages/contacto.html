<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte - PokeTrade</title>
    <meta name="description" content="Contacta con el equipo de PokeTrade para resolver dudas, reportar errores o enviar sugerencias.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="soporte-contenedor">
            <h1>Soporte</h1>
            <p class="subtitulo">¿Tienes algún problema o sugerencia? Escríbenos y te responderemos lo antes posible.</p>

            <div class="soporte-card">
                <div id="alerta" class="alerta" role="alert"></div>

                <form id="form-soporte" novalidate>
                    <div class="form-grupo">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required
                            autocomplete="name" />
                    </div>
                    <div class="form-grupo">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="tu@correo.com" required
                            autocomplete="email" />
                    </div>
                    <div class="form-grupo">
                        <label for="asunto">Asunto</label>
                        <select id="asunto" name="asunto" required>
                            <option value="">Selecciona un asunto...</option>
                            <option value="error">Reportar un error</option>
                            <option value="sugerencia">Sugerencia de mejora</option>
                            <option value="cuenta">Problema con mi cuenta</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-grupo">
                        <label for="mensaje">Mensaje</label>
                        <textarea id="mensaje" name="mensaje" placeholder="Describe tu consulta..." required></textarea>
                    </div>
                    <button type="submit" class="btn-enviar">Enviar mensaje</button>
                </form>

                <div class="soporte-info">
                    <p>También puedes escribirnos directamente a
                        <a href="mailto:poketrade@iesellago.es">poketrade@iesellago.es</a>.</p>
                    <p class="soporte-sede">IES El Lago · Madrid · Daniel Leal &amp; Teo Cristea</p>
                </div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/contacto.js"></script>
</body>
</html>

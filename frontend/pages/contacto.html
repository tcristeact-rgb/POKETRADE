<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var d=document.documentElement,s=localStorage;if(s.getItem('tema')==='oscuro')d.setAttribute('data-tema','oscuro');var i=s.getItem('idioma')||(navigator.language||'es').slice(0,2);d.lang=i;if(i!=='es'){d.classList.add('i18n-pendiente');setTimeout(function(){d.classList.remove('i18n-pendiente');},1500);}}catch(e){}</script>
    <title data-i18n="meta.soporte.title">Soporte - PokeTrade</title>
    <meta name="description" data-i18n-attr="content:meta.soporte.desc" content="Contacta con el equipo de PokeTrade para resolver dudas, reportar errores o enviar sugerencias.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="soporte-contenedor">
            <h1 data-i18n="sop.titulo">Soporte</h1>
            <p class="subtitulo" data-i18n="sop.subtitulo">¿Tienes algún problema o sugerencia? Escríbenos y te responderemos lo antes posible.</p>

            <div class="soporte-card">
                <div id="alerta" class="alerta" role="alert"></div>

                <form id="form-soporte" novalidate>
                    <div class="formulario-grupo">
                        <label for="nombre" data-i18n="auth.nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre"
                            data-i18n-attr="placeholder:auth.nombrePlaceholder" placeholder="Tu nombre" required
                            autocomplete="name" />
                    </div>
                    <div class="formulario-grupo">
                        <label for="email" data-i18n="sop.correo">Correo electrónico</label>
                        <input type="email" id="email" name="email"
                            data-i18n-attr="placeholder:sop.correoPlaceholder" placeholder="tu@correo.com" required
                            autocomplete="email" />
                    </div>
                    <div class="formulario-grupo">
                        <label for="asunto" data-i18n="sop.asunto">Asunto</label>
                        <select id="asunto" name="asunto" required>
                            <option value=""           data-i18n="sop.seleccionaAsunto">Selecciona un asunto...</option>
                            <option value="error"      data-i18n="sop.reportarError">Reportar un error</option>
                            <option value="sugerencia" data-i18n="sop.sugerencia">Sugerencia de mejora</option>
                            <option value="cuenta"     data-i18n="sop.problemaCuenta">Problema con mi cuenta</option>
                            <option value="otro"       data-i18n="sop.otro">Otro</option>
                        </select>
                    </div>
                    <div class="formulario-grupo">
                        <label for="mensaje" data-i18n="sop.mensaje">Mensaje</label>
                        <textarea id="mensaje" name="mensaje" rows="5"
                            data-i18n-attr="placeholder:sop.mensajePlaceholder" placeholder="Describe tu consulta..." required></textarea>
                    </div>
                    <button type="submit" class="btn-enviar" data-i18n="sop.enviar">Enviar mensaje</button>
                </form>

                <div class="soporte-info">
                    <p data-i18n-html="sop.tambienEscribir">También puedes escribirnos directamente a
                        <a href="mailto:poketrade@iesellago.es">poketrade@iesellago.es</a>.</p>
                    <p class="soporte-sede" data-i18n="sop.sede">IES El Lago · Madrid · Daniel Leal &amp; Teo Cristea</p>
                </div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/contacto.js"></script>
</body>
</html>

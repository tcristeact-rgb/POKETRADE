<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - PokeTrade</title>
      <meta name="description" content="Crea tu cuenta en PokeTrade y empieza a intercambiar cartas Pokémon con otros coleccionistas." />
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="formulario-contenedor">
            <h1>Crear cuenta</h1>
            <p class="formulario-intro">
                Los campos marcados con <span class="obligatorio">*</span> son obligatorios.
            </p>
            <p id="error-mensaje" class="error-texto" role="alert" aria-live="assertive"></p>

            <form id="form-registro" novalidate>
                <div class="formulario-grupo">
                    <label for="nombre">Nombre <span class="obligatorio">*</span></label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre"
                           required minlength="2" autocomplete="given-name"
                           aria-describedby="error-nombre" />
                    <span id="error-nombre" class="campo-error" aria-live="polite"></span>
                </div>

                <div class="formulario-grupo">
                    <label for="apellido">Apellido <span class="obligatorio">*</span></label>
                    <input type="text" id="apellido" name="apellido" placeholder="Tu apellido"
                           required minlength="2" autocomplete="family-name"
                           aria-describedby="error-apellido" />
                    <span id="error-apellido" class="campo-error" aria-live="polite"></span>
                </div>

                <div class="formulario-grupo">
                    <label for="email">Email <span class="obligatorio">*</span></label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com"
                           required autocomplete="email" aria-describedby="error-email" />
                    <span id="error-email" class="campo-error" aria-live="polite"></span>
                </div>

                <div class="formulario-grupo">
                    <label for="fecha_nacimiento">Fecha de nacimiento <small>(opcional)</small></label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" />
                </div>

                <div class="formulario-grupo">
                    <label for="nacionalidad">Nacionalidad <small>(opcional)</small></label>
                    <input type="text" id="nacionalidad" name="nacionalidad" placeholder="Española"
                           autocomplete="country-name" />
                </div>

                <div class="formulario-grupo">
                    <label for="password">Contraseña <span class="obligatorio">*</span></label>
                    <input type="password" id="password" name="password" placeholder="Crea una contraseña"
                           required minlength="6" autocomplete="new-password"
                           aria-describedby="ayuda-password error-password" />
                    <small id="ayuda-password" class="campo-ayuda">Debe tener al menos 6 caracteres.</small>
                    <span id="error-password" class="campo-error" aria-live="polite"></span>
                </div>

                <div class="formulario-grupo">
                    <label for="confirmar">Confirmar contraseña <span class="obligatorio">*</span></label>
                    <input type="password" id="confirmar" name="confirmar" placeholder="Repite la contraseña"
                           required autocomplete="new-password" aria-describedby="error-confirmar" />
                    <span id="error-confirmar" class="campo-error" aria-live="polite"></span>
                </div>

                <button type="submit" class="btn-formulario">Crear cuenta</button>
            </form>

            <p class="formulario-pie">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </p>
        </div>
    </main>

    <footer>
        <p>© 2026 PokeTrade · <a href="aviso-legal.html">Aviso legal</a> · <a href="privacidad.html">Privacidad</a> · <a href="Soporte.html">Soporte</a></p>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/registro.js"></script>
</body>
</html>

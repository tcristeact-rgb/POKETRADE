<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - PokeTrade</title>
      <meta name="description" content="Crea tu cuenta en PokeTrade y empieza a intercambiar cartas Pokémon con otros coleccionistas." />
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="formulario-contenedor">
            <h1>Crear cuenta</h1>
            <p id="error-mensaje" class="error-texto"></p>

            <div class="formulario-grupo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" placeholder="Tu nombre" />
            </div>

            <div class="formulario-grupo">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" placeholder="Tu apellido" />
            </div>

            <div class="formulario-grupo">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tu@email.com" />
            </div>

            <div class="formulario-grupo">
                <label for="fecha_nacimiento">Fecha de nacimiento</label>
                <input type="date" id="fecha_nacimiento" />
            </div>

            <div class="formulario-grupo">
                <label for="nacionalidad">Nacionalidad</label>
                <input type="text" id="nacionalidad" placeholder="Española" />
            </div>

            <div class="formulario-grupo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
            </div>

            <div class="formulario-grupo">
                <label for="confirmar">Confirmar contraseña</label>
                <input type="password" id="confirmar" placeholder="Repite la contraseña" />
            </div>

            <button onclick="registrarse()" class="btn-formulario">Crear cuenta</button>

            <p class="formulario-pie">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </p>
        </div>
    </main>

    <footer>
        <p>© 2026 PokeTrade · <a href="aviso-legal.html">Aviso legal</a> · <a href="privacidad.html">Privacidad</a> · <a href="contacto.html">Contacto</a></p>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/registro.js"></script>
</body>
</html>

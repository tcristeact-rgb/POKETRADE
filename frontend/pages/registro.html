<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var d=document.documentElement,s=localStorage,h=document.head;if(s.getItem('tema')==='oscuro')d.setAttribute('data-tema','oscuro');var p=location.pathname.split('/')[1]||'',pre=p.length===2&&p!=='es',raiz=pre||p===''||p==='pages'||p.slice(-5)==='.html',i=pre?p:(s.getItem('idioma')||'es');if(raiz&&!pre&&i!=='es'){location.replace('/'+i+location.pathname+location.search);}d.lang=i;if(i!=='es'){d.classList.add('i18n-pendiente');setTimeout(function(){d.classList.remove('i18n-pendiente');},1500);}function pista(r,u,c){var l=document.createElement('link');l.rel=r;l.href=u;if(c)l.crossOrigin='';h.appendChild(l);}pista('modulepreload',(location.pathname.indexOf('/pages/')>-1?'../':'')+'js/i18n/'+i+'.js');if(!/^(localhost|127\.)/.test(location.hostname))pista('preconnect','https://poketrade-api-3nwm.onrender.com',1);}catch(err){}</script>
    <title data-i18n="meta.registro.title">Registro - PokeTrade</title>
    <meta name="description" data-i18n-attr="content:meta.registro.desc" content="Crea tu cuenta en PokeTrade y empieza a intercambiar cartas Pokémon con otros coleccionistas." />
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">

    <!-- Pistas de carga. El núcleo de módulos se descubre en cascada (header.js
         → auth.js → config.js) y cada nivel cuesta un ida y vuelta entero: esto
         los baja todos a la vez. El diccionario del idioma lo añade el script de
         arriba, que es el único que sabe cuál es.

         La fuente NO se precarga a propósito: son 61 KB que le robarían ancho de
         banda al CSS, que es lo único que bloquea el pintado. Y no hace falta —
         con font-display: swap el texto se lee desde el primer instante y la
         fuente entra cuando llega. Medido: precargarla retrasaba el primer
         pintado 130 ms. -->
    <link rel="modulepreload" href="../js/i18n.js">
    <link rel="modulepreload" href="../js/auth.js">
    <link rel="modulepreload" href="../js/config.js">
    <link rel="modulepreload" href="../js/utils.js">
    <link rel="modulepreload" href="../js/seo.js">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="formulario-contenedor">
            <h1 data-i18n="auth.crearCuenta">Crear cuenta</h1>
            <p class="formulario-intro" data-i18n-html="auth.camposObligatorios">
                Los campos marcados con <span class="obligatorio">*</span> son obligatorios.
            </p>
            <p id="error-mensaje" class="error-texto" role="alert" aria-live="assertive"></p>

            <form id="form-registro" novalidate>
                <div class="formulario-grupo">
                    <label for="nombre"><span data-i18n="auth.nombre">Nombre</span> <span class="obligatorio">*</span></label>
                    <input type="text" id="nombre" name="nombre"
                           data-i18n-attr="placeholder:auth.nombrePlaceholder" placeholder="Tu nombre"
                           required minlength="2" autocomplete="given-name"
                           aria-describedby="error-nombre" />
                    <span id="error-nombre" class="campo-error" aria-live="polite"></span>
                </div>

                <div class="formulario-grupo">
                    <label for="apellido"><span data-i18n="auth.apellido">Apellido</span> <span class="obligatorio">*</span></label>
                    <input type="text" id="apellido" name="apellido"
                           data-i18n-attr="placeholder:auth.apellidoPlaceholder" placeholder="Tu apellido"
                           required minlength="2" autocomplete="family-name"
                           aria-describedby="error-apellido" />
                    <span id="error-apellido" class="campo-error" aria-live="polite"></span>
                </div>

                <div class="formulario-grupo">
                    <label for="email"><span data-i18n="auth.email">Email</span> <span class="obligatorio">*</span></label>
                    <input type="email" id="email" name="email"
                           data-i18n-attr="placeholder:auth.emailPlaceholder" placeholder="tu@email.com"
                           required autocomplete="email" aria-describedby="error-email" />
                    <span id="error-email" class="campo-error" aria-live="polite"></span>
                </div>

                <div class="formulario-grupo">
                    <label for="fecha_nacimiento"><span data-i18n="auth.fechaNacimiento">Fecha de nacimiento</span> <small data-i18n="auth.opcional">(opcional)</small></label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" />
                </div>

                <div class="formulario-grupo">
                    <label for="nacionalidad"><span data-i18n="auth.nacionalidad">Nacionalidad</span> <small data-i18n="auth.opcional">(opcional)</small></label>
                    <input type="text" id="nacionalidad" name="nacionalidad"
                           data-i18n-attr="placeholder:auth.nacionalidadPlaceholder" placeholder="Española"
                           autocomplete="country-name" />
                </div>

                <div class="formulario-grupo">
                    <label for="password"><span data-i18n="auth.password">Contraseña</span> <span class="obligatorio">*</span></label>
                    <input type="password" id="password" name="password"
                           data-i18n-attr="placeholder:auth.crearPasswordPlaceholder" placeholder="Crea una contraseña"
                           required minlength="6" autocomplete="new-password"
                           aria-describedby="ayuda-password error-password" />
                    <small id="ayuda-password" class="campo-ayuda" data-i18n="auth.ayudaPassword">Debe tener al menos 6 caracteres.</small>
                    <span id="error-password" class="campo-error" aria-live="polite"></span>
                </div>

                <div class="formulario-grupo">
                    <label for="confirmar"><span data-i18n="auth.confirmarPassword">Confirmar contraseña</span> <span class="obligatorio">*</span></label>
                    <input type="password" id="confirmar" name="confirmar"
                           data-i18n-attr="placeholder:auth.repitePassword" placeholder="Repite la contraseña"
                           required autocomplete="new-password" aria-describedby="error-confirmar" />
                    <span id="error-confirmar" class="campo-error" aria-live="polite"></span>
                </div>

                <button type="submit" class="btn-formulario" data-i18n="auth.crearCuenta">Crear cuenta</button>
            </form>

            <p class="formulario-pie">
                <span data-i18n="auth.yaTienesCuenta">¿Ya tienes cuenta?</span>
                <a href="login.html" data-i18n="auth.iniciarSesion">Inicia sesión</a>
            </p>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/registro.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{if(localStorage.getItem('tema')==='oscuro')document.documentElement.setAttribute('data-tema','oscuro');}catch(e){}</script>
    <title>Novedades - PokeTrade</title>
    <meta name="description" content="Descubre las últimas cartas Pokémon disponibles en PokeTrade.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="novedades-contenedor">
            <h1>Últimas novedades</h1>
            <p class="subtitulo">Todas las cartas disponibles en el catálogo, ordenadas por incorporación.</p>

            <div id="error-novedades" class="alerta-error" hidden role="alert">
                <span id="error-novedades-msg">No se pudieron cargar las novedades.</span>
                <button id="btn-reintentar-novedades" type="button">Reintentar</button>
            </div>

            <div id="grid-novedades" class="grid-cartas" aria-live="polite">
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/novedades.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var d=document.documentElement,s=localStorage;if(s.getItem('tema')==='oscuro')d.setAttribute('data-tema','oscuro');var p=location.pathname.split('/')[1]||'',pre=/^[a-z]{2}$/.test(p)&&p!=='es',i=pre?p:(s.getItem('idioma')||'es');if(!pre&&i!=='es'){location.replace('/'+i+location.pathname+location.search);}d.lang=i;if(i!=='es'){d.classList.add('i18n-pendiente');setTimeout(function(){d.classList.remove('i18n-pendiente');},1500);}}catch(err){}</script>
    <title data-i18n="meta.novedades.title">Novedades - PokeTrade</title>
    <meta name="description" data-i18n-attr="content:meta.novedades.desc" content="Descubre las últimas cartas Pokémon disponibles en PokeTrade.">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="novedades-contenedor">
            <h1 data-i18n="home.novedadesTitulo">Últimas novedades</h1>
            <p class="subtitulo" data-i18n="nov.subtitulo">Todas las cartas disponibles en el catálogo, ordenadas por incorporación.</p>

            <div id="error-novedades" class="alerta-error" hidden role="alert">
                <span id="error-novedades-msg" data-i18n="home.errorNovedades">No se pudieron cargar las novedades.</span>
                <button id="btn-reintentar-novedades" type="button" data-i18n="comun.reintentar">Reintentar</button>
            </div>

            <div id="grid-novedades" class="grid-cartas" aria-live="polite">
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
                <div class="carta-card skeleton" aria-hidden="true"></div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/novedades.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 733 1024" role="img" aria-label="Ilustración no disponible">
  <!-- Dorso propio de PokeTrade para cartas sin ilustración.
       Diseño geométrico monocromo (carbón + ámbar), deliberadamente
       distinto del dorso oficial de Pokémon: sin remolino, sin azul,
       sin logotipos de terceros. -->
  <rect width="733" height="1024" rx="36" fill="#1A1A1A"/>
  <rect x="30" y="30" width="673" height="964" rx="22" fill="none" stroke="#FBBF24" stroke-opacity="0.5" stroke-width="3"/>
  <rect x="48" y="48" width="637" height="928" rx="16" fill="none" stroke="#FBBF24" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- Resplandor sutil tras la pokébola -->
  <circle cx="366.5" cy="450" r="240" fill="#FBBF24" opacity="0.05"/>

  <!-- Pokébola geométrica de trazo (la gramática del favicon) -->
  <g fill="none" stroke="#FBBF24" stroke-width="16" opacity="0.9">
    <circle cx="366.5" cy="450" r="152"/>
    <path d="M214.5 450h110M409 450h110"/>
    <circle cx="366.5" cy="450" r="52"/>
  </g>
  <circle cx="366.5" cy="450" r="24" fill="#FBBF24" opacity="0.9"/>

  <!-- Marca en versalitas espaciadas -->
  <text x="378" y="760" text-anchor="middle" font-family="'DM Sans','Segoe UI',sans-serif"
        font-size="52" font-weight="600" letter-spacing="16" fill="#9E9E9E">POKETRADE</text>
</svg>
